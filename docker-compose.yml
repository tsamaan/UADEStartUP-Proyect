services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-uade_startup}
      POSTGRES_USER: ${POSTGRES_USER:-uade_startup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uade_startup}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uade_startup} -d ${POSTGRES_DB:-uade_startup}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-uade_startup_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-uade_startup_minio_password}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-uade_startup_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-uade_startup_minio_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-uade-startup}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/$$MINIO_BUCKET;
      mc anonymous set download local/$$MINIO_BUCKET;
      "
    restart: "no"

  backend:
    image: node:22-alpine
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001}
      JSON_BODY_LIMIT: ${JSON_BODY_LIMIT:-1mb}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      DATABASE_URL: ${DATABASE_URL:-postgresql://uade_startup:uade_startup@postgres:5432/uade_startup?schema=public}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3000/auth/google/callback}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-uade_startup_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-uade_startup_minio_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-uade-startup}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ${BACKEND_PATH:-../UADEStartUP-Backend}:/app
      - backend_node_modules:/app/node_modules
    command: >
      sh -c "
      npm install &&
      npm run db:generate &&
      npx prisma migrate deploy &&
      npm run db:seed &&
      npm run dev
      "
    profiles:
      - app

  frontend:
    image: node:22-alpine
    working_dir: /app
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3000/realtime}
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    volumes:
      - ${FRONTEND_PATH:-../UADEStartUP-Frontend}:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "
      npm install &&
      npm run dev -- -H 0.0.0.0
      "
    profiles:
      - app

volumes:
  postgres_data:
  minio_data:
  backend_node_modules:
  frontend_node_modules:
